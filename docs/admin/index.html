<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hackspace Manchester Docs — CMS</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <script>
    // OAuth relay — works around GitHub's COOP headers which null window.opener
    // when the popup visits github.com.
    //
    // Flow:
    //   1. Cloudflare Worker redirects popup to THIS page with token in URL hash.
    //   2. If hash has auth_token, this is the popup: broadcast the token and
    //      wait 800ms before closing (gives Decap CMS time to process the message
    //      before its poll timer detects the popup is closed and cancels auth).
    //   3. Main CMS window receives the broadcast and dispatches a synthetic
    //      MessageEvent that Decap CMS picks up to complete login.
    //
    // If you change the Cloudflare Worker URL, update WORKER_ORIGIN to match.
    (function () {
      var WORKER_ORIGIN = "https://hacman-docs-oauth.board-b92.workers.dev";
      var CHANNEL = "decap-cms-auth";

      var hash = new URLSearchParams(location.hash.slice(1));
      var token = hash.get("auth_token");
      var error = hash.get("auth_error");
      var provider = hash.get("auth_provider") || "github";

      if (token || error) {
        // POPUP RELAY
        console.log("[CMS Auth] Relay: detected token in hash, broadcasting...");
        var bc = new BroadcastChannel(CHANNEL);
        if (token) {
          bc.postMessage({ token: token, provider: provider });
        } else {
          bc.postMessage({ error: decodeURIComponent(error), provider: provider });
        }
        bc.close();
        console.log("[CMS Auth] Relay: broadcast sent, closing in 800ms");
        setTimeout(function () { window.close(); }, 800);
        return;
      }

      // MAIN WINDOW
      console.log("[CMS Auth] Main: setting up BroadcastChannel listener");
      window._decapAuthChannel = new BroadcastChannel(CHANNEL);
      window._decapAuthChannel.onmessage = function (e) {
        console.log("[CMS Auth] Main: received broadcast", e.data);
        window._decapAuthChannel.close();
        window._decapAuthChannel = null;

        if (e.data && e.data.token) {
          console.log("[CMS Auth] Main: dispatching synthetic event, origin:", WORKER_ORIGIN);
          window.dispatchEvent(
            new MessageEvent("message", {
              data: { token: e.data.token, provider: e.data.provider },
              origin: WORKER_ORIGIN,
            })
          );
          console.log("[CMS Auth] Main: synthetic event dispatched");
        }
      };
    })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
