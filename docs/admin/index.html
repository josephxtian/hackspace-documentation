<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hackspace Manchester Docs — CMS</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <script>
    // OAuth relay — works around GitHub's COOP headers which null window.opener.
    //
    // Key insight: Decap CMS checks `authWindow.closed` before processing the
    // auth message. If the popup is closed first, Decap discards the token.
    // So the popup must stay open while Decap processes the event — we close
    // it ourselves from the main window after dispatching.
    //
    // If you change the Cloudflare Worker URL, update WORKER_ORIGIN to match.
    (function () {
      var WORKER_ORIGIN = "https://hacman-docs-oauth.board-b92.workers.dev";
      var CHANNEL = "decap-cms-auth";

      var hash = new URLSearchParams(location.hash.slice(1));
      var token = hash.get("auth_token");
      var error = hash.get("auth_error");
      var provider = hash.get("auth_provider") || "github";

      if (token || error) {
        // POPUP RELAY: broadcast the token and stay open.
        // The main window closes this popup after processing the auth message.
        var bc = new BroadcastChannel(CHANNEL);
        if (token) {
          bc.postMessage({ token: token, provider: provider });
        } else {
          bc.postMessage({ error: decodeURIComponent(error), provider: provider });
        }
        bc.close();
        // Do NOT call window.close() here — popup must stay open so that
        // Decap CMS's authWindow.closed check passes in the main window.
        return;
      }

      // MAIN WINDOW: intercept window.open so we can close the popup
      // after Decap CMS has received and processed the auth token.
      var _authPopup = null;
      var _origOpen = window.open;
      window.open = function () {
        _authPopup = _origOpen.apply(this, arguments);
        return _authPopup;
      };

      // Listen for the auth token from the popup relay.
      // Stored on window to prevent garbage collection dropping the listener.
      window._decapAuthChannel = new BroadcastChannel(CHANNEL);
      window._decapAuthChannel.onmessage = function (e) {
        window._decapAuthChannel.close();
        window._decapAuthChannel = null;

        if (e.data && e.data.token) {
          // Dispatch the synthetic event while popup is still open —
          // Decap CMS checks authWindow.closed before processing.
          window.dispatchEvent(new MessageEvent("message", {
            data: { token: e.data.token, provider: e.data.provider },
            origin: WORKER_ORIGIN,
          }));
          // Now safe to close the popup.
          if (_authPopup && !_authPopup.closed) {
            _authPopup.close();
          }
        }
      };
    })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
